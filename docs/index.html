<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Healing Mart 공통 게임 메뉴 테스트</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;padding:40px 18px;
  display:grid;place-items:center;color:#20263a;background:#f5f7fb;
  font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif
}
.demo{
  width:min(560px,100%);padding:28px;border:1px solid #e3e7ef;
  border-radius:20px;background:#fff;box-shadow:0 14px 40px rgba(31,42,72,.08);
  text-align:center
}
.demo small{color:#5b5ce2;font-weight:900}
.demo h1{margin:7px 0 8px;font-size:25px}
.demo p{margin:0;color:#737d91;line-height:1.7}
.demo button{
  min-height:50px;margin-top:22px;padding:0 20px;color:#fff;border:0;
  border-radius:14px;background:#5b5ce2;font-size:14px;font-weight:900;cursor:pointer
}
</style>
</head>
<body>
<main class="demo" data-current-game="ladder-race">
  <small>Healing-mart.com</small>
  <h1>공통 게임 메뉴 테스트</h1>
  <p>아래 버튼을 누르면 모든 게임에서 공통으로 사용할 바텀시트가 열립니다.</p>
  <button type="button" data-hm-game-menu-open>▦ 게임목록 열기</button>
</main>

<script src="./js/hm-games-data.v1.js"></script>
<script src="./js/hm-game-menu.v1.js"></script>
</body>
</html>
